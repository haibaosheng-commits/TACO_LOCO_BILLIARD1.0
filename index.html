<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACO LOCO BILLIARD</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2a2a2a;
            --accent-color: #00adb5;
            --gold-color: #ffd700;
            --text-color: #ffffff;
            --danger-color: #ff2e63;
            --success-color: #21bf73;
            --purple-color: #a55eea;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .title-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
        }
        .nav-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        nav button {
            background-color: var(--card-bg);
            color: white;
            border: 1px solid var(--accent-color);
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
        }
        nav button.active {
            background-color: var(--accent-color);
        }
        .lang-btn {
            background-color: #444;
            color: white;
            border: 1px solid #666;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        .tables-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .table-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border-top: 5px solid var(--success-color);
            display: flex;
            flex-direction: column;
        }
        .table-card.vip {
            border-top: 5px solid var(--gold-color);
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .table-title {
            font-size: 20px;
            margin: 0;
            font-weight: bold;
        }
        .vip-badge {
            background-color: var(--gold-color);
            color: black;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }
        label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        .time-schedule-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            background: #222;
            padding: 6px 10px;
            border-radius: 4px;
            margin-bottom: 5px;
            color: #ccc;
        }
        .timer-display {
            font-size: 36px;
            text-align: center;
            font-family: monospace;
            margin: 10px 0;
            background: #111;
            padding: 10px;
            border-radius: 5px;
            color: #00ffcc;
        }
        .timer-display.time-up {
            color: var(--danger-color);
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% { opacity: 0.4; }
        }
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-start { background-color: var(--success-color); color: white; }
        .btn-pause { background-color: #ff9f43; color: white; }
        .btn-plus { background-color: #54a0ff; color: white; }
        .btn-stop { background-color: var(--danger-color); color: white; grid-column: span 2; }
        .btn-clear-alarm { background-color: #fff; color: #000; grid-column: span 2; margin-top: 5px; display: none; }
        
        .table-order-history {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #555;
            font-size: 13px;
        }
        .order-tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 5px;
        }
        .order-tag {
            background: #444;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
            color: #ffd700;
        }

        .store-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .store-container { grid-template-columns: 1fr; }
        }
        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }
        .store-category {
            background: var(--card-bg);
            padding: 40px 20px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid transparent;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .store-category:hover {
            border-color: var(--accent-color);
            background: #343434;
        }
        .qr-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: 1px dashed var(--accent-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .qr-code-placeholder {
            width: 160px;
            height: 160px;
            background: white;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qr-code-placeholder img {
            max-width: 100%;
            max-height: 100%;
        }

        /* サウンドボード用スタイル */
        .soundboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        .sound-btn {
            background: linear-gradient(135deg, #3a3a3a, #2b2b2b);
            border: 2px solid var(--purple-color);
            border-radius: 12px;
            padding: 50px 20px;
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .sound-btn:active {
            transform: scale(0.96);
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
            background: var(--purple-color);
        }
        
        .sales-summary {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .total-amount {
            font-size: 28px;
            color: var(--gold-color);
            font-weight: bold;
        }
        .filter-area {
            background: #333;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .filter-area select {
            margin-bottom: 0;
            width: auto;
            min-width: 150px;
        }
        .history-header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .history-header-area h3 {
            margin: 0;
        }
        .history-table-container {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #444;
        }
        th {
            background-color: #333;
            color: var(--accent-color);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 173, 181, 0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
            display: none;
            pointer-events: none;
        }
        #toast-container.show {
            display: block;
            opacity: 1;
        }
    </style>
</head>
<body>

    <header>
        <div class="title-area">
            <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23ffd700'/><circle cx='50' cy='50' r='25' fill='black'/><text x='50%' y='55%' font-size='20' fill='white' font-weight='bold' text-anchor='middle'>8</text></svg>" alt="Logo" style="width:40px; height:40px; object-fit:contain;">
            <h1>TACO LOCO BILLIARD</h1>
